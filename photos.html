<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photos · Aaditya Kumar</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #ff3cac; --purple: #784ba0; --blue: #2b86c5;
    --cyan: #00f5d4; --yellow: #ffe156; --orange: #ff6b35; --green: #06d6a0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: #0a0a0f; color: #fff; overflow-x: hidden; cursor: none; }

  .cursor { position: fixed; width: 18px; height: 18px; border-radius: 50%; background: var(--cyan); pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); mix-blend-mode: difference; }
  .cursor-trail { position: fixed; width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--pink); pointer-events: none; z-index: 9998; transform: translate(-50%,-50%); transition: left 0.15s ease, top 0.15s ease; }

  .bg-blobs { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
  .blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.22; }
  .blob1 { width: 500px; height: 500px; background: var(--pink); top: -100px; left: -100px; }
  .blob2 { width: 400px; height: 400px; background: var(--blue); top: 30%; right: -80px; }
  .blob3 { width: 350px; height: 350px; background: var(--purple); bottom: 10%; left: 20%; }
  .blob4 { width: 300px; height: 300px; background: var(--cyan); bottom: -80px; right: 10%; }

  /* Header */
  .header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(10,10,15,0.9); backdrop-filter: blur(24px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .back-btn {
    display: flex; align-items: center; gap: 8px;
    color: rgba(255,255,255,0.6); text-decoration: none;
    font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
    cursor: none; transition: color 0.3s;
  }
  .back-btn:hover { color: var(--cyan); }
  .header-title {
    font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800;
    background: linear-gradient(135deg, var(--pink), var(--cyan));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .photo-count {
    font-family: 'Syne', sans-serif; font-size: 12px; color: rgba(255,255,255,0.35);
  }

  /* Main content */
  .main { position: relative; z-index: 1; padding: 90px 16px 40px; max-width: 960px; margin: 0 auto; }

  /* Filter section */
  .filter-section { margin-bottom: 24px; }
  .filter-group-label {
    font-family: 'Syne', sans-serif; font-size: 10px; letter-spacing: 3px;
    color: rgba(255,255,255,0.3); text-transform: uppercase; margin-bottom: 10px;
  }
  .filter-tabs { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 14px; }
  .ftab {
    padding: 7px 14px; border-radius: 50px;
    border: 1px solid rgba(255,255,255,0.12);
    background: transparent; color: rgba(255,255,255,0.4);
    font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700;
    cursor: none; transition: all 0.3s;
  }
  .ftab:hover:not(.active-tab) { border-color: rgba(255,255,255,0.25); color: #fff; }
  .ftab.active-tab {
    background: linear-gradient(135deg, var(--pink), var(--purple));
    border-color: transparent; color: #fff;
    box-shadow: 0 4px 14px rgba(255,60,172,0.3);
  }
  .ftab.year-tab.active-tab { background: linear-gradient(135deg, var(--cyan), var(--blue)); box-shadow: 0 4px 14px rgba(0,245,212,0.3); }

  /* Divider */
  .filter-divider { height: 1px; background: rgba(255,255,255,0.06); margin: 14px 0; }

  /* Masonry grid */
  .masonry-grid {
    columns: 2; column-gap: 10px;
  }
  @media (min-width: 600px) { .masonry-grid { columns: 3; } }
  @media (min-width: 900px) { .masonry-grid { columns: 4; } }

  .photo-item {
    break-inside: avoid;
    margin-bottom: 10px;
    border-radius: 14px;
    overflow: hidden;
    position: relative;
    cursor: none;
    transition: transform 0.3s;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
  }
  .photo-item:hover { transform: scale(1.02); }
  .photo-item:hover .photo-overlay { opacity: 1; }

  .photo-item img {
    width: 100%; display: block;
    border-radius: 13px;
    transition: transform 0.3s;
  }
  .photo-item:hover img { transform: scale(1.04); }

  .photo-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(10,10,15,0.85) 0%, transparent 50%);
    border-radius: 13px;
    opacity: 0; transition: opacity 0.3s;
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 12px;
  }
  .photo-caption { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; color: #fff; margin-bottom: 4px; }
  .photo-meta { display: flex; gap: 6px; flex-wrap: wrap; }
  .photo-tag {
    padding: 2px 8px; border-radius: 50px; font-size: 10px;
    font-family: 'Syne', sans-serif; font-weight: 700;
  }
  .tag-year { background: rgba(255,225,86,0.2); color: var(--yellow); }
  .tag-location { background: rgba(0,245,212,0.15); color: var(--cyan); }

  /* Empty state */
  .empty-state {
    text-align: center; padding: 60px 20px;
    color: rgba(255,255,255,0.3);
    font-family: 'Syne', sans-serif;
  }
  .empty-icon { font-size: 48px; margin-bottom: 14px; }
  .empty-text { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
  .empty-sub { font-size: 12px; }

  /* Lightbox */
  .lightbox {
    position: fixed; inset: 0; z-index: 9990;
    background: rgba(0,0,0,0.95);
    display: none; align-items: center; justify-content: center;
    flex-direction: column;
  }
  .lightbox.open { display: flex; }
  .lightbox-img {
    max-width: 92vw; max-height: 75vh;
    border-radius: 16px;
    object-fit: contain;
  }
  .lightbox-info { margin-top: 16px; text-align: center; }
  .lightbox-caption { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 8px; }
  .lightbox-meta { display: flex; gap: 8px; justify-content: center; }
  .lightbox-close {
    position: absolute; top: 20px; right: 20px;
    width: 40px; height: 40px; border-radius: 50%;
    background: rgba(255,255,255,0.1); border: none;
    color: #fff; font-size: 20px; cursor: none;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.3s;
  }
  .lightbox-close:hover { background: rgba(255,60,172,0.3); }
  .lightbox-nav {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
    color: #fff; font-size: 20px; cursor: none;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s;
  }
  .lightbox-nav:hover { background: rgba(0,245,212,0.2); border-color: var(--cyan); }
  .lightbox-prev { left: 16px; }
  .lightbox-next { right: 16px; }
  .lightbox-counter { position: absolute; top: 22px; left: 20px; font-family: 'Syne', sans-serif; font-size: 12px; color: rgba(255,255,255,0.4); }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: #0a0a0f; }
  ::-webkit-scrollbar-thumb { background: linear-gradient(var(--pink),var(--cyan)); border-radius: 2px; }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-trail" id="cursorTrail"></div>

<div class="bg-blobs">
  <div class="blob blob1"></div><div class="blob blob2"></div>
  <div class="blob blob3"></div><div class="blob blob4"></div>
</div>

<!-- Header -->
<div class="header">
  <a href="index.html" class="back-btn">← Aaditya Kumar</a>
  <div class="header-title">My Photos</div>
  <div class="photo-count" id="photoCount">0 photos</div>
</div>

<!-- Main -->
<div class="main">

  <!-- Year Filter -->
  <div class="filter-section">
    <div class="filter-group-label">By Year</div>
    <div class="filter-tabs" id="yearTabs">
      <button class="ftab year-tab active-tab" onclick="filterPhotos('year','all')">All</button>
      <button class="ftab year-tab" onclick="filterPhotos('year','2020')">2020</button>
      <button class="ftab year-tab" onclick="filterPhotos('year','2021')">2021</button>
      <button class="ftab year-tab" onclick="filterPhotos('year','2022')">2022</button>
      <button class="ftab year-tab" onclick="filterPhotos('year','2023')">2023</button>
      <button class="ftab year-tab" onclick="filterPhotos('year','2024')">2024</button>
      <button class="ftab year-tab" onclick="filterPhotos('year','2025')">2025</button>
      <button class="ftab year-tab" onclick="filterPhotos('year','2026')">2026</button>
    </div>

    <div class="filter-divider"></div>

    <!-- Location Filter -->
    <div class="filter-group-label">By Location</div>
    <div class="filter-tabs" id="locationTabs">
      <button class="ftab active-tab" onclick="filterPhotos('location','all')">All</button>
      <button class="ftab" onclick="filterPhotos('location','Village')">🏠 Village</button>
      <button class="ftab" onclick="filterPhotos('location','Ranchi')">🏙️ Ranchi</button>
      <button class="ftab" onclick="filterPhotos('location','Hazaribagh')">🌿 Hazaribagh</button>
      <button class="ftab" onclick="filterPhotos('location','Kota')">📚 Kota</button>
      <button class="ftab" onclick="filterPhotos('location','School')">🏫 School</button>
      <button class="ftab" onclick="filterPhotos('location','Fun')">🎉 Fun</button>
    </div>
  </div>

  <!-- Grid -->
  <div class="masonry-grid" id="photoGrid"></div>
  <div class="empty-state" id="emptyState" style="display:none;">
    <div class="empty-icon">📷</div>
    <div class="empty-text">No photos here yet</div>
    <div class="empty-sub">Add some photos for this filter</div>
  </div>

</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <div class="lightbox-counter" id="lightboxCounter"></div>
  <button class="lightbox-nav lightbox-prev" onclick="navLightbox(-1)">‹</button>
  <img class="lightbox-img" id="lightboxImg" src="" alt="">
  <div class="lightbox-info">
    <div class="lightbox-caption" id="lightboxCaption"></div>
    <div class="lightbox-meta" id="lightboxMeta"></div>
  </div>
  <button class="lightbox-nav lightbox-next" onclick="navLightbox(1)">›</button>
</div>

<script>
  // Cursor
  const cursor = document.getElementById('cursor');
  const trail = document.getElementById('cursorTrail');
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px';
    setTimeout(() => { trail.style.left = e.clientX + 'px'; trail.style.top = e.clientY + 'px'; }, 80);
  });

  // =====================
  // PHOTOS DATA
  // Add your photos here!
  // Format: { url, caption, year, location }
  // =====================
  const photos = [
    { url: 'https://i.ibb.co/n8LdfSDm/IMG-20260414-055513-136.jpg', caption: 'A moment', year: '2026', location: 'Hazaribagh' },
    { url: 'https://i.ibb.co/n8LdfSDm/IMG-20260414-055513-136.jpg', caption: 'Good times', year: '2025', location: 'Kota' },
    { url: 'https://i.ibb.co/n8LdfSDm/IMG-20260414-055513-136.jpg', caption: 'Village vibes', year: '2024', location: 'Village' },
    { url: 'https://i.ibb.co/n8LdfSDm/IMG-20260414-055513-136.jpg', caption: 'Ranchi days', year: '2023', location: 'Ranchi' },
    { url: 'https://i.ibb.co/n8LdfSDm/IMG-20260414-055513-136.jpg', caption: 'School life', year: '2022', location: 'School' },
    { url: 'https://i.ibb.co/n8LdfSDm/IMG-20260414-055513-136.jpg', caption: 'Fun times', year: '2021', location: 'Fun' },
    { url: 'https://i.ibb.co/n8LdfSDm/IMG-20260414-055513-136.jpg', caption: 'Memories', year: '2020', location: 'Village' },
    { url: 'https://i.ibb.co/n8LdfSDm/IMG-20260414-055513-136.jpg', caption: 'Hazaribagh life', year: '2026', location: 'Hazaribagh' },
    { url: 'https://i.ibb.co/n8LdfSDm/IMG-20260414-055513-136.jpg', caption: 'Kota grind', year: '2025', location: 'Kota' },
    { url: 'https://i.ibb.co/n8LdfSDm/IMG-20260414-055513-136.jpg', caption: 'Village home', year: '2024', location: 'Village' },
    { url: 'https://i.ibb.co/n8LdfSDm/IMG-20260414-055513-136.jpg', caption: 'City life', year: '2023', location: 'Ranchi' },
    { url: 'https://i.ibb.co/n8LdfSDm/IMG-20260414-055513-136.jpg', caption: 'School days', year: '2022', location: 'School' },
  ];

  let currentFilter = { year: 'all', location: 'all' };
  let filteredPhotos = [];
  let currentLightboxIndex = 0;

  function getFilteredPhotos() {
    return photos.filter(p => {
      const yearOk = currentFilter.year === 'all' || p.year === currentFilter.year;
      const locOk = currentFilter.location === 'all' || p.location === currentFilter.location;
      return yearOk && locOk;
    });
  }

  function renderPhotos() {
    filteredPhotos = getFilteredPhotos();
    const grid = document.getElementById('photoGrid');
    const empty = document.getElementById('emptyState');
    const count = document.getElementById('photoCount');

    count.textContent = filteredPhotos.length + ' photo' + (filteredPhotos.length !== 1 ? 's' : '');

    if (filteredPhotos.length === 0) {
      grid.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    grid.innerHTML = filteredPhotos.map((p, i) => `
      <div class="photo-item" onclick="openLightbox(${i})">
        <img src="${p.url}" alt="${p.caption}" loading="lazy">
        <div class="photo-overlay">
          <div class="photo-caption">${p.caption}</div>
          <div class="photo-meta">
            <span class="photo-tag tag-year">📅 ${p.year}</span>
            <span class="photo-tag tag-location">📍 ${p.location}</span>
          </div>
        </div>
      </div>
    `).join('');
  }

  function filterPhotos(type, value) {
    currentFilter[type] = value;

    // Update active tab
    if (type === 'year') {
      document.querySelectorAll('.year-tab').forEach(t => t.classList.remove('active-tab'));
    } else {
      document.querySelectorAll('.ftab:not(.year-tab)').forEach(t => t.classList.remove('active-tab'));
    }
    event.target.classList.add('active-tab');

    renderPhotos();
  }

  function openLightbox(index) {
    currentLightboxIndex = index;
    updateLightbox();
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }

  function navLightbox(dir) {
    currentLightboxIndex = (currentLightboxIndex + dir + filteredPhotos.length) % filteredPhotos.length;
    updateLightbox();
  }

  function updateLightbox() {
    const p = filteredPhotos[currentLightboxIndex];
    document.getElementById('lightboxImg').src = p.url;
    document.getElementById('lightboxCaption').textContent = p.caption;
    document.getElementById('lightboxCounter').textContent = (currentLightboxIndex + 1) + ' / ' + filteredPhotos.length;
    document.getElementById('lightboxMeta').innerHTML = `
      <span class="photo-tag tag-year">📅 ${p.year}</span>
      <span class="photo-tag tag-location">📍 ${p.location}</span>
    `;
  }

  // Close lightbox on background click
  document.getElementById('lightbox').addEventListener('click', function(e) {
    if (e.target === this) closeLightbox();
  });

  // Keyboard nav
  document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key === 'ArrowRight') navLightbox(1);
    if (e.key === 'ArrowLeft') navLightbox(-1);
    if (e.key === 'Escape') closeLightbox();
  });

  // Touch swipe for lightbox
  let touchStartX = 0;
  document.getElementById('lightbox').addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
  document.getElementById('lightbox').addEventListener('touchend', e => {
    const diff = touchStartX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 50) navLightbox(diff > 0 ? 1 : -1);
  });

  // Init
  renderPhotos();
</script>
</body>
</html>
